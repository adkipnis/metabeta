name: Release checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync environment
        run: uv sync --dev

      - name: Check formatting
        run: uv run blue --check --diff metabeta tests

      - name: Run tests
        run: uv run pytest tests/models tests/evaluation tests/utils

      - name: Build release artifacts
        run: uv build

      - name: Check release artifacts
        run: uv run pytest tests/packaging/test_release_artifacts.py
