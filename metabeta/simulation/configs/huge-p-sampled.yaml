# re-usable data configuration
ds_type: 'sampled' # type of predictors [toy, flat, scm, sampled, mixed]
source: 'all' # source dataset (ignored, unless ds_type == 'sampled')
likelihood_family: 2 # 0 = normal, 1 = bernoulli, 2 = poisson
max_d: 12 # maximum number of fixed effects (intercept + slopes)
max_q: 4 # maximum number of random effects (intercept + slopes)
min_m: 5 # minimum number of groups
max_m: 125 # maximum number of groups
min_n: 10 # minimum number of samples per group
max_n: 200 # maximum number of samples per group
