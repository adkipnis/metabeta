# re-usable data configuration
ds_type: 'flat' # type of predictors [toy, flat, scm, sampled]
source: 'all' # source dataset (ignored, unless ds_type == 'sampled')
max_d: 3 # maximum number of fixed effects (intercept + slopes)
max_q: 1 # maximum number of random effects (intercept + slopes)
min_m: 10 # minimum number of groups
max_m: 30 # maximum number of groups
min_n: 20 # minimum number of samples per group
max_n: 40 # maximum number of samples per group
correlated_rfx: true # model correlated random effects via LKJ prior
