# experiment
name: 'small-n-mixed'
d_tag: 'small-n-mixed'          # points to metabeta/simulation/configs/*.yaml
d_tag_valid: 'small-n-sampled'    # validation data config tag
m_tag: 'small'                  # points to metabeta/models/configs/*.yaml
seed: 42

# runtime
device: 'cuda'         # cpu|cuda|mps
cores: 8
reproducible: false
compile: false
verbosity: 1          # warnings|infos|debug
wandb: false

# training
max_epochs: 500
bs: 32                # batch size
lr: 1.0e-3
max_grad_norm: 1.0
loss_type: 'forward'  # forward|backward|mixed
patience: 10          # early stopping
sample_interval: 5
skip_ref: false       # skip reference run before training

# evaluation
n_samples: 512        # posterior draws
rescale: true         # unstandardize y
importance: false     # importance sampling
sir: false            # sampling importance resampling
sir_iter: 8
plot: true

# checkpoint
r_tag: ''             # run tag
save_latest: true
save_best: true
load_latest: false
load_best: false
