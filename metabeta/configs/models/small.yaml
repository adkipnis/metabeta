posterior_correlation: false

summarizer_g:
    type: 'set-transformer'
    d_model: 64
    d_ff: 256
    d_output: 32
    n_blocks: 3
    n_isab: 1
    activation: 'GELU'
    dropout: 0.01

summarizer_l:
    n_isab: 0
    n_blocks: 2

posterior_g:
    type: 'coupling'
    transform: 'spline+'
    base_family: 'normal'
    base_trainable: True
    n_blocks: 4
    subnet_kwargs:
        net_type: 'residual'
        activation: 'ReLU'
        d_ff: 128
        depth: 3
        dropout: 0.0
        zero_init: True
        use_bias: False

posterior_l:
    n_blocks: 2 # should be 4
