summarizer_g:
    type: 'set-transformer'
    d_model: 128
    d_ff: 512
    d_output: 64
    n_blocks: 4
    n_isab: 1
    activation: 'GELU'
    dropout: 0.01

summarizer_l:
    n_isab: 0
    n_blocks: 3

posterior_g:
    type: 'coupling'
    transform: 'spline+'
    base_family: 'normal'
    base_trainable: True
    n_blocks: 6
    subnet_kwargs:
        net_type: 'residual'
        activation: 'ReLU'
        d_ff: 256
        depth: 3
        dropout: 0.0
        zero_init: True
        use_bias: False

posterior_l:
    n_blocks: 3
