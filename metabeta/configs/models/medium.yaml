summarizer_g:
    type: 'set-transformer'
    d_model: 96
    d_ff: 384
    d_output: 32
    n_blocks: 3
    n_isab: 1
    activation: 'GELU'
    dropout: 0.01

summarizer_l:
    n_isab: 0
    n_blocks: 2

posterior_g:
    type: 'coupling'
    transform: 'spline'
    base_family: 'normal'
    base_trainable: true
    base_context: true
    n_blocks: 4
    subnet_kwargs:
        net_type: 'residual'
        activation: 'ReLU'
        d_ff: 256
        depth: 3
        dropout: 0.0
        zero_init: true
        use_bias: false
        use_glu: true
    rq_kwargs:
        adaptive_domain: true
        adaptive_tails: true
        alpha: 2.0

posterior_l:
    n_blocks: 2

posterior_correlation: false
