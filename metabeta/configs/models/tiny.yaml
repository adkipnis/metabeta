summarizer_g:
    type: 'set-transformer'
    d_model: 32
    d_ff: 128
    d_output: 16
    n_blocks: 2
    n_isab: 0
    activation: 'GELU'
    dropout: 0.0

summarizer_l:
    n_blocks: 1

posterior_g:
    type: 'coupling'
    transform: 'spline'
    base_family: 'normal'
    base_trainable: True
    base_context: true
    n_blocks: 3
    subnet_kwargs:
        net_type: 'residual'
        activation: 'ReLU'
        d_ff: 64
        depth: 3
        dropout: 0.0
        zero_init: True
        use_bias: False
    rq_kwargs:
        adaptive_domain: true

posterior_l:
    n_blocks: 2

posterior_correlation: false
analytical_context: true
analytical_blup_from_globals: true
