# Configuration presets for template-based config generation
# Used by metabeta/utils/templates.py

# Size presets for simulation/training configs
# min_d / min_q define non-overlapping bands used for test-set generation,
# so that each regime exercises a clearly distinct slice of problem space.
# Training on the full range always uses min_d=2, min_q=1 (huge preset or CLI override).
sizes:
  tiny: # just for prototyping
    max_d: 2
    max_q: 1
    min_m: 5
    max_m: 25
    min_n: 5
    max_n: 25
    max_n_total: 250

  small:
    max_d: 4
    min_d: 1
    max_q: 2
    min_m: 5
    max_m: 150
    min_n: 5
    max_n: 150
    max_n_total: 4000

  medium:
    max_d: 8
    min_d: 5
    max_q: 3
    min_m: 5
    max_m: 150
    min_n: 5
    max_n: 150
    max_n_total: 4000

  large:
    max_d: 12
    min_d: 9
    max_q: 4
    min_m: 5
    max_m: 150
    min_n: 5
    max_n: 150
    max_n_total: 4000

  huge:
    max_d: 16
    min_d: 13
    max_q: 5
    min_m: 5
    max_m: 150
    min_n: 5
    max_n: 150
    max_n_total: 4000

# Likelihood family presets
# Use integer IDs: 0=normal, 1=bernoulli, 2=poisson
families:
  0:
    likelihood_family: 0
    name: normal
    min_bg_df: 4  # buffer above max(d, q(q+1)/2); m_low = max(d, q(q+1)/2) + min_bg_df
  1:
    likelihood_family: 1
    name: bernoulli
    min_bg_df: 4  # buffer above max(d, q(q+1)/2); m_low = max(d, q(q+1)/2) + min_bg_df
  2:
    likelihood_family: 2
    name: poisson
    min_bg_df: 4  # buffer above max(d, q(q+1)/2); m_low = max(d, q(q+1)/2) + min_bg_df

# CLI-only parameters (never have defaults in YAML configs)
cli_only:
  - device
  - verbosity
  - wandb
  - seed
