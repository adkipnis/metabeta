# Configuration presets for template-based config generation
# Used by metabeta/utils/templates.py

# Size presets for simulation/training configs
sizes:
  tiny:
    max_d: 2
    max_q: 1
    min_m: 5
    max_m: 20
    min_n: 5
    max_n: 30
    max_n_total: 500

  small:
    max_d: 4
    max_q: 2
    min_m: 5
    max_m: 25
    min_n: 5
    max_n: 20
    max_n_total: 1000

  medium:
    max_d: 8
    max_q: 3
    min_m: 5
    max_m: 60
    min_n: 5
    max_n: 30
    max_n_total: 2000

  large:
    max_d: 16
    max_q: 4
    min_m: 5
    max_m: 100
    min_n: 5
    max_n: 50
    max_n_total: 4000

  huge:
    max_d: 32
    max_q: 5
    min_m: 5
    max_m: 200
    min_n: 5
    max_n: 80
    max_n_total: 8000

# Likelihood family presets
# Use integer IDs: 0=normal, 1=bernoulli, 2=poisson
families:
  0:
    likelihood_family: 0
    name: normal
    min_bg_df: 4  # need ≥4 between-group df for Normal variance components to be estimable
  1:
    likelihood_family: 1
    name: bernoulli
    min_bg_df: 4  # need ≥4 between-group df for reliable PQL variance estimation
  2:
    likelihood_family: 2
    name: poisson
    min_bg_df: 4  # need ≥4 between-group df for reliable PQL variance estimation

# CLI-only parameters (never have defaults in YAML configs)
cli_only:
  - device
  - verbosity
  - wandb
  - seed
