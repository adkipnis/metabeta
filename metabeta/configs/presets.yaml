# Configuration presets for template-based config generation
# Used by metabeta/utils/templates.py

# Size presets for simulation/training configs
# min_d / min_q define non-overlapping bands used for test-set generation,
# so that each regime exercises a clearly distinct slice of problem space.
# Training on the full range always uses min_d=2, min_q=1 (huge preset or CLI override).
sizes:
  tiny:
    min_d: 2
    max_d: 2
    min_q: 1
    max_q: 1
    min_m: 5
    max_m: 25
    min_n: 2
    max_n: 50
    max_n_total: 500

  small:
    min_d: 3
    max_d: 4
    min_q: 1
    max_q: 2
    min_m: 5
    max_m: 50
    min_n: 2
    max_n: 100
    max_n_total: 1000

  medium:
    min_d: 5
    max_d: 8
    min_q: 2
    max_q: 3
    min_m: 5
    max_m: 100
    min_n: 2
    max_n: 150
    max_n_total: 2000

  large:
    min_d: 9
    max_d: 16
    min_q: 3
    max_q: 4
    min_m: 5
    max_m: 200
    min_n: 2
    max_n: 250
    max_n_total: 4000

  huge:
    min_d: 17
    max_d: 32
    min_q: 4
    max_q: 5
    min_m: 5
    max_m: 300
    min_n: 2
    max_n: 500
    max_n_total: 8000

# Likelihood family presets
# Use integer IDs: 0=normal, 1=bernoulli, 2=poisson
families:
  0:
    likelihood_family: 0
    name: normal
    min_bg_df: 4  # need ≥4 between-group df for Normal variance components to be estimable
  1:
    likelihood_family: 1
    name: bernoulli
    min_bg_df: 4  # need ≥4 between-group df for reliable PQL variance estimation
  2:
    likelihood_family: 2
    name: poisson
    min_bg_df: 4  # need ≥4 between-group df for reliable PQL variance estimation

# CLI-only parameters (never have defaults in YAML configs)
cli_only:
  - device
  - verbosity
  - wandb
  - seed
