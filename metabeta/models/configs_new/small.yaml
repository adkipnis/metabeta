summarizer:
    type: 'set-transformer'
    d_model: 64 # input
    d_ff: 256 # 4x d_model
    d_output: 32 # summary dim
    n_blocks: 3 # encoder blocks
    n_isab: 1 # ISAB blocks (first of the three encoder blocks)
    activation: 'GELU'
    dropout: 0.0

posterior:
    type: 'coupling'
    transform: 'spline+' # Neural Spline Flow with learned domain
    base_family: 'normal'
    base_trainable: True # mean and variance of base are learned
    n_blocks: 2 # coupling blocks
    subnet_kwargs:
        net_type: 'residual' # residual MLP as conditioner
        activation: 'ELU'
        d_ff: 128 # hidden
        depth: 3 # depth of MLP
        dropout: 0.0
        zero_init: True
        use_bias: False
