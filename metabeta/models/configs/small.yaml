summarizer:
    type: 'set-transformer'
    d_model: 64
    d_ff: 128
    d_output: 32
    n_blocks: 3
    n_isab: 1
    activation: 'GELU'
    dropout: 0.0

posterior:
    type: 'coupling'
    transform: 'spline+'
    base_family: 'normal'
    base_trainable: True
    n_blocks: 2
    subnet_kwargs:
        net_type: 'residual'
        activation: 'ReLU'
        d_ff: 128
        depth: 3
        dropout: 0.01
        zero_init: True
        use_bias: False
