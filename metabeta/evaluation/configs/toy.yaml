# experiment
name: 'toy'
d_tag: 'toy'          # points to metabeta/simulation/configs/toy.yaml
m_tag: 'toy'          # points to metabeta/models/configs/toy.yaml
seed: 42
r_tag: ''

# runtime
device: 'cpu'
compile: false
verbosity: 1          # 0=warnings | 1=info | 2=debug

# evaluation
n_samples: 512        # posterior draws
rescale: true         # unstandardize y
importance: false     # importance sampling post-hoc
sir: false            # sampling importance resampling
sir_iter: 8

# checkpoint
prefix: 'latest'        # best | latest

# outputs
plot: true
