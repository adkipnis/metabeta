# experiment
name: 'big-p-mixed'
d_tag: 'big-p-mixed'          # points to metabeta/simulation/configs/big-p-mixed.yaml
m_tag: 'big'                  # points to metabeta/models/configs/big.yaml
seed: 42
r_tag: ''

# runtime
device: 'cpu'
compile: false
verbosity: 1          # 0=warnings | 1=info | 2=debug

# evaluation
n_samples: 512        # posterior draws
rescale: true         # unstandardize y
importance: false     # importance sampling post-hoc
sir: false            # sampling importance resampling
sir_iter: 8
conformal: true       # calibrate credible interval estimation using conformal correction

# checkpoint
prefix: 'best'          # best | latest

# outputs
plot: true
