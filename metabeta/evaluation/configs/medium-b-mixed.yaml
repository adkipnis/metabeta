# experiment
name: 'medium-b-mixed'
d_tag: 'medium-b-mixed'          # points to metabeta/simulation/configs/medium-b-mixed.yaml
d_tag_valid: 'medium-b-sampled'
m_tag: 'medium'                  # points to metabeta/models/configs/medium.yaml
seed: 42
r_tag: ''

# runtime
device: 'cpu'
compile: false
verbosity: 1          # 0=warnings | 1=info | 2=debug

# evaluation
likelihood_family: 1
n_samples: 512        # posterior draws
rescale: true         # unstandardize y
importance: false    # importance sampling post-hoc
sir: false            # sampling importance resampling
sir_iter: 8
conformal: false       # calibrate credible interval estimation using conformal correction

# checkpoint
prefix: 'best'          # best | latest

# outputs
plot: true
