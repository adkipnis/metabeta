# experiment
name: 'small-n-sampled'
d_tag: 'small-n-sampled'          # points to metabeta/simulation/configs/small-n-sampled.yaml
d_tag_valid: 'small-n-sampled'
m_tag: 'small'                    # points to metabeta/models/configs/small.yaml
seed: 42
r_tag: ''

# runtime
device: 'cpu'
compile: false
verbosity: 1          # 0=warnings | 1=info | 2=debug

# evaluation
likelihood_family: 0
n_samples: 512        # posterior draws
rescale: true         # unstandardize y
importance: true     # importance sampling post-hoc
sir: false            # sampling importance resampling
sir_iter: 8
conformal: false       # calibrate credible interval estimation using conformal correction

# checkpoint
prefix: 'best'          # best | latest

# outputs
plot: true
